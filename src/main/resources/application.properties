spring.application.name=api
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/messenger-db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA:}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}

messaging.websocket.endpoint=${MESSAGING_WEBSOCKET_ENDPOINT:/ws}
messaging.stomp.app-prefix=${MESSAGING_STOMP_APP_PREFIX:/app}
messaging.stomp.user-queue-destination=${MESSAGING_USER_QUEUE_DESTINATION:/queue/messages}
messaging.stomp.room-topic-destination=${MESSAGING_ROOM_TOPIC_DESTINATION:/topic/conversations}
messaging.cors.allowed-origin-patterns=${MESSAGING_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
